name: Release DMG

# Builds a distributable DMG. Runs on demand (Actions tab → Run workflow)
# or on a version tag push. Self-contained on purpose: it does NOT touch
# build.sh or the local dev flow.
#
# Signing is automatic based on which repo secrets exist:
#   - No secrets → ad-hoc signed DMG (fine for our own Macs).
#   - MACOS_CERT_P12 + MACOS_CERT_PASSWORD → Developer ID signing with
#     hardened runtime.
#   - APPLE_ID + APPLE_TEAM_ID + APPLE_APP_PASSWORD as well → notarized
#     and stapled: installs on any Mac with zero Gatekeeper friction.
#
# Secrets to add after backlog 7.1 (Settings → Secrets and variables →
# Actions):
#   MACOS_CERT_P12       base64 of the exported Developer ID Application
#                        certificate (.p12):  base64 -i cert.p12 | pbcopy
#   MACOS_CERT_PASSWORD  the .p12 export password
#   APPLE_ID             Apple ID email of the developer account
#   APPLE_TEAM_ID        10-character team ID (developer.apple.com →
#                        Membership details)
#   APPLE_APP_PASSWORD   app-specific password (account.apple.com →
#                        Sign-In and Security → App-Specific Passwords)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  dmg:
    runs-on: macos-15
    # Generous: a new Apple account's first notarizations can sit in
    # extended review for over an hour. Steady-state runs take minutes.
    timeout-minutes: 180
    env:
      HAS_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' }}
      HAS_NOTARY: ${{ secrets.APPLE_APP_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            app/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('app/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # The same build that build.sh ships.
      - name: Build (release)
        working-directory: app
        run: swift build -c release

      # Never package a DMG whose tests fail.
      - name: Test
        working-directory: app
        run: swift test

      - name: Assemble app bundle
        run: |
          APP="dist/GeorgesWords.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp app/.build/release/GeorgesWords "$APP/Contents/MacOS/GeorgesWords"
          cp app/Info.plist "$APP/Contents/Info.plist"
          cp app/icon/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          /usr/libexec/PlistBuddy -c "Add :GWBuildCommit string ${GITHUB_SHA::7}" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :GWBuildDate string $(date -u '+%Y-%m-%d %H:%MZ')" "$APP/Contents/Info.plist"

      - name: Import signing certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci build.keychain
          rm cert.p12
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::Certificate imported but no 'Developer ID Application' identity found — wrong certificate type?"
            exit 1
          fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Sign
        run: |
          if [ -n "${SIGN_IDENTITY:-}" ]; then
            echo "Signing with: $SIGN_IDENTITY (hardened runtime)"
            codesign --force --options runtime --timestamp \
              --entitlements app/GeorgesWords.entitlements \
              --sign "$SIGN_IDENTITY" dist/GeorgesWords.app
          else
            echo "No Developer ID secrets — ad-hoc signing (see 7.1)"
            codesign --force --deep --sign - dist/GeorgesWords.app
          fi

      - name: Package DMG
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' app/Info.plist)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          mkdir -p dist/dmg
          cp -R dist/GeorgesWords.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "George's Words" -srcfolder dist/dmg -ov -format UDZO "dist/GeorgesWords-$VERSION.dmg"
          if [ -n "${SIGN_IDENTITY:-}" ]; then
            codesign --force --timestamp --sign "$SIGN_IDENTITY" "dist/GeorgesWords-$VERSION.dmg"
          fi

      # Submit once, then poll with retries: first-account notarizations
      # sit in Apple's queue for a long while, and a single --wait dies on
      # any transient runner network blip (seen in run #3).
      - name: Notarize and staple
        if: env.HAS_NOTARY == 'true' && env.HAS_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          SUBMISSION_ID=$(xcrun notarytool submit "dist/GeorgesWords-$VERSION.dmg" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --output-format json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo "Notary submission: $SUBMISSION_ID"
          done=""
          for attempt in 1 2 3 4; do
            if xcrun notarytool wait "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" --timeout 45m; then
              done=1
              break
            fi
            echo "wait attempt $attempt dropped (network blip?) — retrying in 30 s"
            sleep 30
          done
          STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --output-format json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
          echo "Notary status: $STATUS"
          if [ "$STATUS" != "Accepted" ]; then
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" || true
            exit 1
          fi
          xcrun stapler staple "dist/GeorgesWords-$VERSION.dmg"

      - name: Verify bundle structure
        run: |
          test -x dist/GeorgesWords.app/Contents/MacOS/GeorgesWords
          test -f dist/GeorgesWords.app/Contents/Resources/AppIcon.icns
          codesign -dv dist/GeorgesWords.app
          hdiutil verify "dist/GeorgesWords-$VERSION.dmg"
          if [ -n "${SIGN_IDENTITY:-}" ] && [ "$HAS_NOTARY" = "true" ]; then
            xcrun stapler validate "dist/GeorgesWords-$VERSION.dmg"
            spctl --assess --type open --context context:primary-signature "dist/GeorgesWords-$VERSION.dmg"
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeorgesWords-${{ env.VERSION }}-dmg
          path: dist/GeorgesWords-*.dmg
          if-no-files-found: error
