name: Release DMG

# Builds a distributable DMG. Runs on demand (Actions tab → Run workflow)
# or on a version tag push. Self-contained on purpose: it does NOT touch
# build.sh or the local dev flow.
#
# Signing is automatic based on which repo secrets exist:
#   - No secrets → ad-hoc signed DMG (fine for our own Macs).
#   - MACOS_CERT_P12 + MACOS_CERT_PASSWORD → Developer ID signing with
#     hardened runtime.
#   - APPLE_ID + APPLE_TEAM_ID + APPLE_APP_PASSWORD as well → notarized
#     and stapled: installs on any Mac with zero Gatekeeper friction.
#
# Secrets to add after backlog 7.1 (Settings → Secrets and variables →
# Actions):
#   MACOS_CERT_P12       base64 of the exported Developer ID Application
#                        certificate (.p12):  base64 -i cert.p12 | pbcopy
#   MACOS_CERT_PASSWORD  the .p12 export password
#   APPLE_ID             Apple ID email of the developer account
#   APPLE_TEAM_ID        10-character team ID (developer.apple.com →
#                        Membership details)
#   APPLE_APP_PASSWORD   app-specific password (account.apple.com →
#                        Sign-In and Security → App-Specific Passwords)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # publish releases + push the appcast

jobs:
  dmg:
    runs-on: macos-15
    # Long waits happen in the Staple Release workflow, not here: this
    # job submits, preserves the DMG, waits at most ~40 min, and exits
    # cleanly either way.
    timeout-minutes: 90
    env:
      HAS_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' }}
      HAS_NOTARY: ${{ secrets.APPLE_APP_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            app/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('app/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # The same build that build.sh ships.
      - name: Build (release)
        working-directory: app
        run: swift build -c release

      # Never package a DMG whose tests fail.
      - name: Test
        working-directory: app
        run: swift test

      - name: Assemble app bundle
        run: |
          APP="dist/GeorgesWords.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources" "$APP/Contents/Frameworks"
          cp app/.build/release/GeorgesWords "$APP/Contents/MacOS/GeorgesWords"
          cp app/Info.plist "$APP/Contents/Info.plist"
          cp app/icon/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          /usr/libexec/PlistBuddy -c "Add :GWBuildCommit string ${GITHUB_SHA::7}" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :GWBuildDate string $(date -u '+%Y-%m-%d %H:%MZ')" "$APP/Contents/Info.plist"
          # Sparkle compares CFBundleVersion numerically — the run number
          # gives every release a strictly increasing build number.
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" "$APP/Contents/Info.plist"
          # Embed the Sparkle framework and point the binary at it.
          SPARKLE_FW="$(find app/.build -type d -name "Sparkle.framework" -path "*release*" | head -1)"
          if [ -z "$SPARKLE_FW" ]; then
            SPARKLE_FW="$(find app/.build -type d -name "Sparkle.framework" | head -1)"
          fi
          test -n "$SPARKLE_FW"
          ditto "$SPARKLE_FW" "$APP/Contents/Frameworks/Sparkle.framework"
          install_name_tool -add_rpath "@executable_path/../Frameworks" "$APP/Contents/MacOS/GeorgesWords" 2>/dev/null || true

      - name: Import signing certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci build.keychain
          rm cert.p12
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::Certificate imported but no 'Developer ID Application' identity found — wrong certificate type?"
            exit 1
          fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Sign
        run: |
          if [ -n "${SIGN_IDENTITY:-}" ]; then
            echo "Signing with: $SIGN_IDENTITY (hardened runtime)"
            # Nested Sparkle code first (no app entitlements on helpers),
            # innermost out — notarization inspects every nested binary.
            FW="dist/GeorgesWords.app/Contents/Frameworks/Sparkle.framework"
            if [ -d "$FW" ]; then
              for HELPER in "$FW"/Versions/B/XPCServices/*.xpc "$FW/Versions/B/Autoupdate" "$FW/Versions/B/Updater.app"; do
                if [ -e "$HELPER" ]; then
                  codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$HELPER"
                fi
              done
              codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "$FW"
            fi
            codesign --force --options runtime --timestamp \
              --entitlements app/GeorgesWords.entitlements \
              --sign "$SIGN_IDENTITY" dist/GeorgesWords.app
          else
            echo "No Developer ID secrets — ad-hoc signing (see 7.1)"
            codesign --force --deep --sign - dist/GeorgesWords.app
          fi

      - name: Package DMG
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' app/Info.plist)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          mkdir -p dist/dmg
          cp -R dist/GeorgesWords.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname "George's Words" -srcfolder dist/dmg -ov -format UDZO "dist/GeorgesWords-$VERSION.dmg"
          if [ -n "${SIGN_IDENTITY:-}" ]; then
            codesign --force --timestamp --sign "$SIGN_IDENTITY" "dist/GeorgesWords-$VERSION.dmg"
          fi

      - name: Verify bundle structure
        run: |
          test -x dist/GeorgesWords.app/Contents/MacOS/GeorgesWords
          test -f dist/GeorgesWords.app/Contents/Resources/AppIcon.icns
          codesign -dv dist/GeorgesWords.app
          hdiutil verify "dist/GeorgesWords-$VERSION.dmg"

      # Submit ONCE and record the submission ID. A notarization ticket is
      # tied to this exact file's hash, so the DMG is preserved as an
      # artifact IMMEDIATELY — before any waiting — and a pending verdict
      # is NOT a failure. The Staple Release workflow finishes the job
      # whenever Apple's verdict lands. (The old design waited up to 3 h
      # in-job and died before the upload step, losing the submitted DMG —
      # eight submissions were stranded that way.)
      - name: Submit for notarization
        if: env.HAS_NOTARY == 'true' && env.HAS_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          SUBMISSION_ID=$(xcrun notarytool submit "dist/GeorgesWords-$VERSION.dmg" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --output-format json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo "Notary submission: $SUBMISSION_ID"
          echo "$SUBMISSION_ID" > dist/submission-id.txt
          echo "SUBMISSION_ID=$SUBMISSION_ID" >> "$GITHUB_ENV"

      - name: Preserve DMG and submission ID
        if: always() && env.VERSION != ''
        uses: actions/upload-artifact@v4
        with:
          name: GeorgesWords-${{ env.VERSION }}-dmg
          path: |
            dist/GeorgesWords-*.dmg
            dist/submission-id.txt
          if-no-files-found: error

      - name: Wait briefly for a verdict
        if: env.HAS_NOTARY == 'true' && env.HAS_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --timeout 40m || true
          STATUS=$(xcrun notarytool info "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --output-format json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
          echo "Notary status: $STATUS"
          if [ "$STATUS" = "Invalid" ]; then
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" || true
            exit 1
          fi
          if [ "$STATUS" != "Accepted" ]; then
            echo "::warning::Verdict still '$STATUS'. DMG + submission ID are preserved as artifacts — run the Staple Release workflow (with this run's ID) once Apple accepts."
            echo "NOTARY_ACCEPTED=0" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "NOTARY_ACCEPTED=1" >> "$GITHUB_ENV"
          xcrun stapler staple "dist/GeorgesWords-$VERSION.dmg"
          xcrun stapler validate "dist/GeorgesWords-$VERSION.dmg"
          spctl --assess --type open --context context:primary-signature "dist/GeorgesWords-$VERSION.dmg"

      - name: Upload stapled DMG
        if: env.NOTARY_ACCEPTED == '1'
        uses: actions/upload-artifact@v4
        with:
          name: GeorgesWords-${{ env.VERSION }}-dmg-stapled
          path: dist/GeorgesWords-*.dmg
          if-no-files-found: error

      # The stapled DMG becomes a real GitHub Release, and the Sparkle
      # appcast on main starts pointing at it — every installed copy
      # picks it up within a day (or on Check for Updates). ADR 0007.
      - name: Publish release and update feed
        if: env.NOTARY_ACCEPTED == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${VERSION}-b${GITHUB_RUN_NUMBER}"
          DMG="GeorgesWords-${VERSION}.dmg"
          gh release create "$TAG" "dist/$DMG" \
            --title "George's Words ${VERSION} (build ${GITHUB_RUN_NUMBER})" \
            --notes "Notarized, stapled, auto-updating build."
          LENGTH=$(stat -f%z "dist/$DMG")
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${DMG}"
          python3 - "$VERSION" "$GITHUB_RUN_NUMBER" "$URL" "$LENGTH" <<'PYEOF'
          import sys, email.utils, time
          version, build, url, length = sys.argv[1:5]
          appcast = f"""<?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>George's Words</title>
              <item>
                <title>Version {version} (build {build})</title>
                <pubDate>{email.utils.formatdate(time.time())}</pubDate>
                <sparkle:version>{build}</sparkle:version>
                <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure url="{url}" length="{length}" type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          """
          lines = [line[10:] if line.startswith(" " * 10) else line for line in appcast.splitlines()]
          open("appcast.xml", "w").write("\n".join(line for line in lines if line.strip() or line == "") + "\n")
          PYEOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # swift build may have refreshed Package.resolved — commit it too
          # so local checkouts stay clean, and autostash any other noise
          # (run #13 died here on an unstaged-changes refusal).
          git add appcast.xml app/Package.resolved
          git commit -m "Appcast: ${VERSION} build ${GITHUB_RUN_NUMBER}"
          git pull --rebase --autostash origin main
          git push origin main
