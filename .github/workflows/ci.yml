name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    # macos-15's default Xcode has Swift 6 — FluidAudio's manifest needs
    # tools 6.0, which macos-14's default toolchain can't parse.
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            app/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('app/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # The same build that build.sh ships.
      - name: Build (release)
        working-directory: app
        run: swift build -c release

      - name: Test
        working-directory: app
        run: swift test

  # The Whisper-only fallback (GW_PARAKEET=0) is the escape hatch if
  # FluidAudio ever regresses — keep it compiling so it's there when
  # needed.
  build-whisper-only:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      GW_PARAKEET: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            app/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-whisper-${{ runner.os }}-${{ hashFiles('app/Package.resolved') }}
          restore-keys: |
            spm-whisper-${{ runner.os }}-

      - name: Build (release, Whisper-only)
        working-directory: app
        run: swift build -c release
