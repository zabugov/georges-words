name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            app/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('app/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # The same build that build.sh ships.
      - name: Build (release)
        working-directory: app
        run: swift build -c release

      - name: Test
        working-directory: app
        run: swift test
