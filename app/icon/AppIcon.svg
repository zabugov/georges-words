<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- George's Words app icon: a "G" whose crossbar is a voice waveform. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338CA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glyphShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="13" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- macOS icon-grid squircle: 824x824 centered on the 1024 canvas -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#sheen)"/>

  <g stroke="#FFFFFF" stroke-linecap="round" fill="none" filter="url(#glyphShadow)">
    <!-- The G: a 270-degree ring, open on the right -->
    <path d="M 678.9 345.1 A 236 236 0 1 0 678.9 678.9" stroke-width="100"/>
    <!-- The crossbar as a waveform; the heavy last bar is the G's upright
         stem, flush with the ring's outer edge -->
    <line x1="516" y1="490" x2="516" y2="534" stroke-width="56"/>
    <line x1="592" y1="445" x2="592" y2="579" stroke-width="56"/>
    <line x1="668" y1="475" x2="668" y2="549" stroke-width="56"/>
    <line x1="756" y1="424" x2="756" y2="600" stroke-width="84"/>
  </g>
</svg>
